<svg width="1280" height="360" viewBox="0 0 1280 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Open Obsidian Sync">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b0f"/>
      <stop offset="1" stop-color="#17121f"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="360" fill="url(#bg)"/>
  <circle cx="245" cy="180" r="210" fill="url(#glow)"/>

  <!-- Obsidian-style gem mark -->
  <g transform="translate(120 70) scale(0.43)">
    <path d="M258 48 402 138 448 300 322 462 136 420 70 236 152 92Z" fill="#7C3AED"/>
    <path d="M258 48 402 138 210 246 152 92Z" fill="#A78BFA"/>
    <path d="M210 246 322 462 136 420 70 236Z" fill="#4C1D95"/>
    <path d="M152 92 258 384M402 138 210 246" stroke="#D8B4FE" stroke-width="5" stroke-linecap="round"/>
    <!-- sync arrows -->
    <path d="M336 224a104 76 0 0 0-160 66" fill="none" stroke="#ECFCCB" stroke-width="17" stroke-linecap="round"/>
    <path d="M176 290 154 288 166 270Z" fill="#ECFCCB"/>
    <path d="M176 288a104 76 0 0 0 160-66" fill="none" stroke="#ECFCCB" stroke-width="17" stroke-linecap="round"/>
    <path d="M336 222 358 224 346 242Z" fill="#ECFCCB"/>
  </g>

  <text x="360" y="168" fill="#fafafa" font-family="Inter, Segoe UI, sans-serif" font-size="66" font-weight="800">Open Obsidian Sync</text>
  <text x="362" y="220" fill="#c4b5fd" font-family="Inter, Segoe UI, sans-serif" font-size="26" font-weight="500">Bring-your-own-cloud sync for Obsidian, powered by rclone</text>
  <g font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="600" fill="#a1a1aa" text-anchor="middle">
    <rect x="362" y="250" width="250" height="40" rx="20" fill="none" stroke="#3f3f46"/>
    <text x="487" y="276">End-to-end encryption</text>
    <rect x="630" y="250" width="168" height="40" rx="20" fill="none" stroke="#3f3f46"/>
    <text x="714" y="276">70+ providers</text>
    <rect x="816" y="250" width="240" height="40" rx="20" fill="none" stroke="#3f3f46"/>
    <text x="936" y="276">No subscription, MIT</text>
  </g>
</svg>
